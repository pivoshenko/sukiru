name: release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build binaries
        run: |
          mkdir -p dist
          rustup target add x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-apple-darwin aarch64-apple-darwin
          cargo build --release --target x86_64-unknown-linux-gnu
          cargo build --release --target aarch64-unknown-linux-gnu
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          cp target/x86_64-unknown-linux-gnu/release/sukiru dist/sukiru-linux-amd64
          cp target/aarch64-unknown-linux-gnu/release/sukiru dist/sukiru-linux-arm64
          cp target/x86_64-apple-darwin/release/sukiru dist/sukiru-darwin-amd64
          cp target/aarch64-apple-darwin/release/sukiru dist/sukiru-darwin-arm64

      - name: Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
