name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/sukiro-linux-amd64 ./cmd/sukiro
          GOOS=linux GOARCH=arm64 go build -o dist/sukiro-linux-arm64 ./cmd/sukiro
          GOOS=darwin GOARCH=amd64 go build -o dist/sukiro-darwin-amd64 ./cmd/sukiro
          GOOS=darwin GOARCH=arm64 go build -o dist/sukiro-darwin-arm64 ./cmd/sukiro

      - name: Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
