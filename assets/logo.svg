    <rect x="440" y="160" width="120" height="30" rx="7" fill="#100C14" />

    <circle cx="208" cy="122" r="6" fill="#7A727E" />
    <circle cx="792" cy="122" r="6" fill="#7A727E" />
    <circle cx="208" cy="378" r="6" fill="#7A727E" />
    <circle cx="792" cy="378" r="6" fill="#7A727E" />

